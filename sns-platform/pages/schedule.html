<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="DIVOOST SNS">
    <link rel="manifest" href="../manifest.json">
    <title>예약 발행 | SNS 플랫폼</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/sns.css">
    <style>
        .schedule-form{background:#fff;border-radius:12px;border:1px solid #e2e8f0;padding:20px;margin-bottom:16px}
        .schedule-form h2{font-size:1rem;margin-bottom:12px}
        .form-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px}
        .form-group{display:flex;flex-direction:column;gap:4px}
        .form-group label{font-size:.75rem;font-weight:600;color:#64748b}
        .form-group input,.form-group select{padding:8px 12px;border-radius:8px;border:1px solid #e2e8f0;font-size:.82rem}
        .scheduled-list{background:#fff;border-radius:12px;border:1px solid #e2e8f0;overflow:hidden}
        .sch-item{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #f1f5f9}
        .sch-item:last-child{border:none}
        .sch-time{font-size:.8rem;font-weight:700;color:#3b82f6;min-width:100px}
        .sch-info{flex:1;min-width:0}
        .sch-title{font-size:.82rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .sch-channels{font-size:.7rem;color:#94a3b8;margin-top:2px}
        .sch-actions button{padding:4px 10px;border-radius:4px;border:1px solid #e2e8f0;background:#fff;font-size:.68rem;cursor:pointer;margin-left:4px}
        .empty{text-align:center;padding:40px;color:#94a3b8}
        @media(max-width:768px){.form-row{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-logo"><div class="logo-icon">📱</div><div class="logo-text">SNS 콘텐츠<small>자동화 플랫폼</small></div></div>
            <nav class="sidebar-nav">
                <div class="nav-section"><div class="nav-title">대시보드</div><a href="../index.html" class="nav-link"><span>📊</span> 종합 현황</a><a href="calendar.html" class="nav-link"><span>📅</span> 캘린더</a></div>
                <div class="nav-section"><div class="nav-title">콘텐츠 생성</div><a href="create.html" class="nav-link"><span>✍️</span> 콘텐츠 만들기</a><a href="ai-writer.html" class="nav-link"><span>🤖</span> AI 작성기</a><a href="media.html" class="nav-link"><span>🖼</span> 미디어</a><a href="templates.html" class="nav-link"><span>📋</span> 템플릿</a></div>
                <div class="nav-section"><div class="nav-title">포스팅 관리</div><a href="publish.html" class="nav-link"><span>🚀</span> 포스팅</a><a href="schedule.html" class="nav-link active"><span>⏰</span> 예약 발행</a><a href="history.html" class="nav-link"><span>📜</span> 발행 이력</a></div>
                <div class="nav-section"><div class="nav-title">인터렉션</div><a href="engagement.html" class="nav-link"><span>💬</span> 댓글/반응</a><a href="listening.html" class="nav-link"><span>👂</span> 소셜 리스닝</a><a href="analytics.html" class="nav-link"><span>📈</span> 분석 리포트</a></div>
                <div class="nav-section"><div class="nav-title">시스템</div><a href="settings.html" class="nav-link"><span>⚙️</span> 설정</a><a href="billing.html" class="nav-link"><span>💳</span> 요금제/크레딧</a><a href="safety-guide.html" class="nav-link"><span>⚠️</span> 운영 가이드</a></div>
            </nav>
        </aside>
        <div class="main-content">
            <header class="top-bar"><div class="top-bar-left"><button class="menu-btn" id="menuBtn">☰</button><div><div class="top-bar-title">⏰ 예약 발행</div><div class="top-bar-sub">콘텐츠 자동 발행 스케줄</div></div></div></header>
            <div class="content">
                <div class="schedule-form">
                    <h2>📅 새 예약 추가</h2>
                    <div class="form-row">
                        <div class="form-group"><label>콘텐츠 선택</label><select id="schPost"><option value="">임시저장된 콘텐츠 선택</option></select></div>
                        <div class="form-group"><label>발행 날짜</label><input type="date" id="schDate"></div>
                        <div class="form-group"><label>발행 시간</label><input type="time" id="schTime" value="09:00"></div>
                    </div>
                    <div class="form-row">
                        <div class="form-group"><label>반복</label><select id="schRepeat"><option value="once">1회만</option><option value="daily">매일</option><option value="weekly">매주</option><option value="monthly">매월</option></select></div>
                        <div class="form-group"><label>최적 시간 추천</label><button onclick="suggestTime()" style="padding:8px 16px;border-radius:8px;border:none;background:#8b5cf6;color:#fff;font-size:.78rem;font-weight:600;cursor:pointer;margin-top:auto">🤖 AI 추천</button></div>
                        <div class="form-group"><label>&nbsp;</label><button onclick="addSchedule()" style="padding:8px 16px;border-radius:8px;border:none;background:#3b82f6;color:#fff;font-size:.78rem;font-weight:600;cursor:pointer;margin-top:auto">➕ 예약 추가</button></div>
                    </div>
                </div>
                <div class="section-title">📋 예약된 콘텐츠</div>
                <div class="scheduled-list" id="scheduleList"><div class="empty">예약된 콘텐츠가 없습니다</div></div>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('menuBtn').onclick=function(){document.getElementById('sidebar').classList.toggle('open')};
        var today=new Date().toISOString().slice(0,10);
        document.getElementById('schDate').value=today;

        function loadDrafts(){
            var posts=JSON.parse(localStorage.getItem('snsPosts')||'[]');
            var sel=document.getElementById('schPost');
            posts.forEach(function(p){
                var opt=document.createElement('option');
                opt.value=p.id;opt.textContent=p.title+' ('+p.status+')';
                sel.appendChild(opt);
            });
        }

        function suggestTime(){
            var times=['09:00','12:30','18:00','20:30','22:00'];
            var best=times[Math.floor(Math.random()*times.length)];
            document.getElementById('schTime').value=best;
            alert('🤖 AI 추천 시간: '+best+'\n\n이 시간대에 인터렉션이 가장 활발합니다');
        }

        function addSchedule(){
            var postId=document.getElementById('schPost').value;
            var date=document.getElementById('schDate').value;
            var time=document.getElementById('schTime').value;
            var repeat=document.getElementById('schRepeat').value;
            if(!date){alert('날짜를 선택하세요');return}

            var schedules=JSON.parse(localStorage.getItem('snsSchedules')||'[]');
            var posts=JSON.parse(localStorage.getItem('snsPosts')||'[]');
            var post=posts.find(function(p){return p.id===postId});

            schedules.push({
                id:Date.now().toString(),
                postId:postId,
                title:post?post.title:'직접 입력 콘텐츠',
                channels:post?post.channels:['facebook'],
                date:date,
                time:time,
                repeat:repeat,
                status:'pending'
            });
            localStorage.setItem('snsSchedules',JSON.stringify(schedules));
            renderSchedules();
            alert('✅ 예약 추가: '+date+' '+time);
        }

        function renderSchedules(){
            var schedules=JSON.parse(localStorage.getItem('snsSchedules')||'[]');
            if(schedules.length===0){document.getElementById('scheduleList').innerHTML='<div class="empty">예약된 콘텐츠가 없습니다</div>';return}
            var channelNames={'facebook':'📘 FB','tiktok':'🎵 TT','instagram':'📸 IG','naver_blog':'📗 블로그','naver_cafe':'☕ 카페','xiaohongshu':'📕 샤오홍수','douyin':'🎬 도우인'};
            var repeatNames={'once':'1회','daily':'매일','weekly':'매주','monthly':'매월'};
            document.getElementById('scheduleList').innerHTML=schedules.sort(function(a,b){return (a.date+a.time).localeCompare(b.date+b.time)}).map(function(s){
                var channels=(s.channels||[]).map(function(c){return channelNames[c]||c}).join(' ');
                return '<div class="sch-item"><div class="sch-time">'+s.date+'<br>'+s.time+'</div><div class="sch-info"><div class="sch-title">'+s.title+'</div><div class="sch-channels">'+channels+' · '+repeatNames[s.repeat]+'</div></div><div class="sch-actions"><button onclick="cancelSchedule(\''+s.id+'\')">❌ 취소</button></div></div>';
            }).join('');
        }

        function cancelSchedule(id){
            if(!confirm('예약을 취소하시겠습니까?'))return;
            var schedules=JSON.parse(localStorage.getItem('snsSchedules')||'[]');
            schedules=schedules.filter(function(s){return s.id!==id});
            localStorage.setItem('snsSchedules',JSON.stringify(schedules));
            renderSchedules();
        }

        loadDrafts();
        renderSchedules();
    </script>
    <script src="../js/auth-guard.js"></script>
    <script>
        if("serviceWorker" in navigator){ navigator.serviceWorker.register("/divoost-website/sns-platform/sw.js").catch(function(){}); }
    </script>
</body>
</html>
