<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#3b82f6">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="DIVOOST SNS">
    <link rel="manifest" href="manifest.json">
    <title data-i18n="doc_title">로그인 / 회원가입 | SNS 플랫폼</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter','Pretendard',-apple-system,sans-serif;background:linear-gradient(135deg,#eef2ff 0%,#e0f2fe 50%,#ecfdf5 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;color:#0f172a;-webkit-font-smoothing:antialiased}
        .auth-container{width:100%;max-width:440px}
        .auth-logo{text-align:center;margin-bottom:24px}
        .auth-logo-icon{font-size:48px;margin-bottom:8px}
        .auth-logo-title{font-size:24px;font-weight:800;color:#0f172a;letter-spacing:-.02em}
        .auth-logo-sub{font-size:13px;color:#64748b;margin-top:4px}

        .auth-card{background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(15,23,42,.08);padding:32px;border:1px solid #e2e8f0}

        .auth-tabs{display:flex;gap:4px;background:#f1f5f9;border-radius:10px;padding:4px;margin-bottom:24px}
        .auth-tab{flex:1;padding:10px;border:none;background:transparent;font-size:14px;font-weight:600;color:#64748b;cursor:pointer;border-radius:8px;transition:.2s}
        .auth-tab.active{background:#fff;color:#0f172a;box-shadow:0 2px 4px rgba(0,0,0,.04)}

        .form-group{margin-bottom:14px}
        .form-group label{display:block;font-size:12px;font-weight:600;color:#475569;margin-bottom:6px}
        .form-group input{width:100%;padding:12px 14px;border-radius:10px;border:1px solid #e2e8f0;font-size:14px;font-family:inherit;transition:border-color .2s,box-shadow .2s}
        .form-group input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
        .form-group .input-wrap{position:relative}
        .form-group .toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#94a3b8;font-size:16px;padding:4px}
        .form-group .toggle-pw:hover{color:#475569}

        .pw-strength{margin-top:6px;display:flex;gap:3px;height:4px}
        .pw-strength-bar{flex:1;background:#e2e8f0;border-radius:2px;transition:background .2s}
        .pw-strength-bar.weak{background:#ef4444}
        .pw-strength-bar.medium{background:#f59e0b}
        .pw-strength-bar.strong{background:#10b981}
        .pw-strength-text{font-size:11px;color:#94a3b8;margin-top:4px;font-weight:600}

        .form-row{display:flex;justify-content:space-between;align-items:center;margin:8px 0 18px;font-size:12.5px}
        .checkbox-label{display:flex;align-items:center;gap:6px;color:#64748b;cursor:pointer;user-select:none}
        .checkbox-label input{margin:0;cursor:pointer}
        .forgot-link{color:#3b82f6;text-decoration:none;font-weight:600}
        .forgot-link:hover{text-decoration:underline}

        .btn-submit{width:100%;padding:13px;border-radius:10px;border:none;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;font-size:14px;font-weight:700;cursor:pointer;transition:.2s;display:flex;align-items:center;justify-content:center;gap:8px}
        .btn-submit:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(59,130,246,.3)}
        .btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none;box-shadow:none}
        .spinner{display:none;width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
        .btn-submit.loading .spinner{display:inline-block}
        @keyframes spin{to{transform:rotate(360deg)}}

        .divider{display:flex;align-items:center;gap:12px;margin:20px 0;color:#94a3b8;font-size:12px;font-weight:600}
        .divider::before,.divider::after{content:'';flex:1;height:1px;background:#e2e8f0}

        .social-btn{width:100%;padding:11px;border-radius:10px;border:1px solid #e2e8f0;background:#fff;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;color:#0f172a;transition:.2s;margin-bottom:8px}
        .social-btn:hover{background:#f8fafc;border-color:#cbd5e1}
        .social-btn .ico{font-size:16px}

        .auth-footer{text-align:center;font-size:12.5px;color:#64748b;margin-top:18px}
        .auth-footer a{color:#3b82f6;font-weight:700;text-decoration:none}

        .alert{padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:14px;display:flex;align-items:flex-start;gap:8px;font-weight:500}
        .alert.error{background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
        .alert.success{background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
        .alert.info{background:#dbeafe;color:#1e40af;border:1px solid #bfdbfe}

        .pane{display:none}
        .pane.active{display:block}

        .verify-icon{font-size:64px;text-align:center;margin-bottom:16px}
        .verify-title{font-size:18px;font-weight:700;text-align:center;margin-bottom:10px}
        .verify-text{font-size:13px;color:#475569;text-align:center;line-height:1.6;margin-bottom:8px}
        .verify-email{font-weight:700;color:#3b82f6;font-size:14px;display:block;margin:10px 0}
        .resend-btn{background:none;border:none;color:#3b82f6;font-weight:600;cursor:pointer;padding:6px 12px;font-size:12px;text-decoration:underline}

        .terms-text{font-size:11px;color:#94a3b8;text-align:center;line-height:1.6;margin-top:14px}
        .terms-text a{color:#3b82f6;text-decoration:none}

        @media(max-width:480px){
            .auth-card{padding:24px 20px}
            .auth-logo-title{font-size:20px}
        }
        .lang-switch{display:flex;justify-content:flex-end;margin-bottom:10px}
        .lang-switch select{padding:7px 12px;min-height:38px;border:1px solid #e2e8f0;border-radius:9px;background:#fff;color:#334155;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
        .lang-switch select:focus{outline:none;border-color:#3b82f6}
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="lang-switch">
            <select id="langSelect" onchange="I18N.setLang(this.value)" aria-label="Language">
                <option value="ko">🇰🇷 한국어</option>
                <option value="en">🇺🇸 English</option>
                <option value="vi">🇻🇳 Tiếng Việt</option>
            </select>
        </div>
        <div class="auth-logo">
            <div class="auth-logo-icon">📱</div>
            <div class="auth-logo-title" data-i18n="logo_title">SNS 콘텐츠 플랫폼</div>
            <div class="auth-logo-sub" data-i18n="logo_sub">7개 SNS 채널 통합 관리 자동화</div>
        </div>

        <div class="auth-card">
            <!-- Tabs -->
            <div class="auth-tabs" id="authTabs">
                <button class="auth-tab active" data-pane="login" onclick="switchTab('login')" data-i18n="tab_login">로그인</button>
                <button class="auth-tab" data-pane="signup" onclick="switchTab('signup')" data-i18n="tab_signup">회원가입</button>
            </div>

            <!-- Alert area -->
            <div id="alertArea"></div>

            <!-- LOGIN PANE -->
            <div class="pane active" id="pane-login">
                <div class="form-group">
                    <label data-i18n="label_email">이메일</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label data-i18n="label_password">비밀번호</label>
                    <div class="input-wrap">
                        <input type="password" id="loginPassword" placeholder="비밀번호" data-i18n-ph="ph_password" autocomplete="current-password">
                        <button class="toggle-pw" onclick="togglePw('loginPassword')">👁</button>
                    </div>
                </div>
                <div class="form-row">
                    <label class="checkbox-label"><input type="checkbox" id="rememberMe" checked> <span data-i18n="remember">로그인 상태 유지</span></label>
                    <a class="forgot-link" onclick="forgotPassword()" data-i18n="forgot">비밀번호 찾기</a>
                </div>
                <button class="btn-submit" id="btnLogin" onclick="handleLogin()">
                    <div class="spinner"></div>
                    <span data-i18n="btn_login">로그인</span>
                </button>
            </div>

            <!-- SIGNUP PANE -->
            <div class="pane" id="pane-signup">
                <div class="form-group">
                    <label data-i18n="label_name">이름 (선택)</label>
                    <input type="text" id="signupName" placeholder="홍길동" data-i18n-ph="ph_name" autocomplete="name">
                </div>
                <div class="form-group">
                    <label data-i18n="label_email">이메일</label>
                    <input type="email" id="signupEmail" placeholder="your@email.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label data-i18n="label_password">비밀번호</label>
                    <div class="input-wrap">
                        <input type="password" id="signupPassword" placeholder="6자 이상" data-i18n-ph="ph_pw_min" autocomplete="new-password" oninput="checkPwStrength()">
                        <button class="toggle-pw" onclick="togglePw('signupPassword')">👁</button>
                    </div>
                    <div class="pw-strength">
                        <div class="pw-strength-bar" id="pwBar1"></div>
                        <div class="pw-strength-bar" id="pwBar2"></div>
                        <div class="pw-strength-bar" id="pwBar3"></div>
                        <div class="pw-strength-bar" id="pwBar4"></div>
                    </div>
                    <div class="pw-strength-text" id="pwStrengthText" data-i18n="pw_strength">비밀번호 강도</div>
                </div>
                <div class="form-group">
                    <label data-i18n="label_pw_confirm">비밀번호 확인</label>
                    <div class="input-wrap">
                        <input type="password" id="signupPasswordConfirm" placeholder="비밀번호 재입력" data-i18n-ph="ph_pw_confirm" autocomplete="new-password">
                        <button class="toggle-pw" onclick="togglePw('signupPasswordConfirm')">👁</button>
                    </div>
                </div>
                <div class="form-row">
                    <label class="checkbox-label"><input type="checkbox" id="agreeTerms"> <span data-i18n="agree_terms">이용약관 및 개인정보처리방침에 동의합니다</span></label>
                </div>
                <button class="btn-submit" id="btnSignup" onclick="handleSignup()">
                    <div class="spinner"></div>
                    <span data-i18n="btn_signup">회원가입</span>
                </button>
            </div>

            <!-- VERIFY EMAIL PANE -->
            <div class="pane" id="pane-verify">
                <div class="verify-icon">📧</div>
                <div class="verify-title" data-i18n="verify_title">이메일 인증을 진행해주세요</div>
                <div class="verify-text" data-i18n-html="verify_text">
                    가입하신 이메일로 <strong>6자리 인증번호</strong>를 전송했습니다.<br>
                    메일함을 확인하고 아래에 입력해주세요.
                </div>
                <span class="verify-email" id="verifyEmailAddr">your@email.com</span>

                <div class="form-group" style="margin-top:18px">
                    <label data-i18n="label_otp">인증번호 6자리</label>
                    <input type="text" id="verifyOtp" placeholder="123456" inputmode="numeric" pattern="[0-9]*" maxlength="6"
                           autocomplete="one-time-code"
                           style="text-align:center;font-size:24px;letter-spacing:8px;font-weight:700;font-family:monospace">
                </div>

                <button class="btn-submit" id="btnVerify" onclick="handleVerifyOtp()" data-i18n="btn_verify">인증하고 시작하기</button>

                <div class="verify-text" style="margin-top:10px;font-size:12px;color:#94a3b8" data-i18n-html="verify_or_link">
                    또는 메일에 포함된 <strong>인증 링크</strong>를 클릭하셔도 됩니다.
                </div>

                <div style="text-align:center;margin-top:18px">
                    <button class="resend-btn" onclick="resendVerification()" data-i18n="resend">📤 인증 메일 재발송</button>
                </div>
                <div style="text-align:center;margin-top:14px">
                    <button class="btn-submit" onclick="switchTab('login')" style="background:#f1f5f9;color:#475569" data-i18n="to_login">로그인 화면으로</button>
                </div>
            </div>

            <!-- FORGOT PASSWORD PANE -->
            <div class="pane" id="pane-forgot">
                <div class="verify-icon">🔐</div>
                <div class="verify-title" data-i18n="forgot_title">비밀번호 재설정</div>
                <div class="verify-text" style="margin-bottom:18px" data-i18n-html="forgot_text">가입하신 이메일을 입력하시면<br>비밀번호 재설정 링크를 전송해드립니다.</div>
                <div class="form-group">
                    <label data-i18n="label_email">이메일</label>
                    <input type="email" id="forgotEmail" placeholder="your@email.com">
                </div>
                <button class="btn-submit" id="btnForgot" onclick="handleForgot()">
                    <div class="spinner"></div>
                    <span data-i18n="btn_forgot">재설정 메일 보내기</span>
                </button>
                <div style="text-align:center;margin-top:14px">
                    <button class="resend-btn" onclick="switchTab('login')" data-i18n="back_to_login">로그인 화면으로 돌아가기</button>
                </div>
            </div>

            <!-- Social Login (only on login/signup) -->
            <div id="socialSection">
                <div class="divider" data-i18n="divider_or">또는</div>
                <button class="social-btn" onclick="showSocialAlert('Google')"><span class="ico">🔵</span> <span data-i18n="social_google">Google로 계속하기</span></button>
                <button class="social-btn" onclick="showSocialAlert('Kakao')"><span class="ico">💬</span> <span data-i18n="social_kakao">카카오로 계속하기</span></button>
            </div>

            <div class="auth-footer" id="authFooter">
                <span id="footerText" data-i18n="footer_no_account">계정이 없으신가요?</span>
                <a onclick="switchTab('signup')" id="footerLink" data-i18n="link_signup">회원가입</a>
            </div>

            <div class="terms-text" data-i18n-html="terms_text">
                계속 진행하시면 <a href="#">이용약관</a> 및 <a href="#">개인정보처리방침</a>에 동의하는 것으로 간주됩니다.
            </div>
        </div>
    </div>

                logo_sub: 'Tự động hóa quản lý 7 kênh SNS',
                tab_login: 'Đăng nhập', tab_signup: 'Đăng ký',
                label_email: 'Email', label_password: 'Mật khẩu', ph_password: 'Mật khẩu',
                remember: 'Duy trì đăng nhập', forgot: 'Quên mật khẩu?', btn_login: 'Đăng nhập',
                label_name: 'Tên (tùy chọn)', ph_name: 'Nguyễn Văn A', ph_pw_min: 'Tối thiểu 6 ký tự',

                verify_or_link: 'Hoặc nhấp vào <strong>liên kết xác minh</strong> trong email.',
                resend: '📤 Gửi lại email xác minh', to_login: 'Về trang đăng nhập',
                forgot_title: 'Đặt lại mật khẩu',

                btn_forgot: 'Gửi email đặt lại', back_to_login: 'Quay lại đăng nhập',
                divider_or: 'hoặc', social_google: 'Tiếp tục với Google', social_kakao: 'Tiếp tục với Kakao',
                footer_no_account: 'Chưa có tài khoản?', footer_have_account: 'Đã có tài khoản?',
                link_signup: 'Đăng ký', link_login: 'Đăng nhập',
                terms_text: 'Khi tiếp tục, bạn đồng ý với <a href="#">Điều khoản dịch vụ</a> và <a href="#">Chính sách bảo mật</a> của chúng tôi.',
                err_email_required: 'Vui lòng nhập email', err_email_invalid: 'Định dạng email không hợp lệ',
                err_pw_min: 'Mật khẩu phải có ít nhất 6 ký tự', err_pw_mismatch: 'Mật khẩu không khớp',
                err_agree: 'Vui lòng đồng ý với Điều khoản dịch vụ', ok_signup: 'Đăng ký thành công! Đang chuyển hướng...',
                err_signup: 'Đăng ký thất bại', err_already: 'Email này đã được đăng ký. Vui lòng đăng nhập.',
                err_pw_required: 'Vui lòng nhập mật khẩu', ok_login: 'Đăng nhập thành công! Đang chuyển hướng...',
                err_login: 'Đăng nhập thất bại', err_invalid_cred: 'Email hoặc mật khẩu không đúng',
                err_not_confirmed: 'Email chưa được xác minh. Vui lòng kiểm tra hộp thư.',
                err_resend_no_email: 'Không có email để gửi lại'
            }
        };
    </script>
    <script src="js/i18n.js"></script>

    <script>
        // ─── Supabase Auth Config ───
        var SUPABASE_URL = 'https://unruyezigyybnuvgdgdt.supabase.co';
        var SUPABASE_KEY = 'sb_publishable_CTq6ypxtybUPWUcYptiQ0A_mOa0b2hs';
        // 로그인 후 이동: ?next= 파라미터(동일 origin만 허용 — 오픈 리다이렉트 방지), 없으면 기본 설정 페이지
        var REDIRECT_URL = (function () {
            var nxt = new URLSearchParams(window.location.search).get('next');
            if (nxt && nxt.indexOf(window.location.origin) === 0) return nxt;
            return window.location.origin + window.location.pathname.replace('auth.html', 'pages/settings.html');
        })();

        // ─── Already logged in? Redirect ───
        var existingSession = JSON.parse(localStorage.getItem('snsAuthSession') || 'null');
        if(existingSession && existingSession.access_token){
            // verify expiry
            if(existingSession.expires_at && existingSession.expires_at * 1000 > Date.now()){
                window.location.href = REDIRECT_URL;
            } else {
                localStorage.removeItem('snsAuthSession');
            }
        }

        // ─── Tab switching ───
        function switchTab(name){
            document.querySelectorAll('.pane').forEach(function(p){ p.classList.remove('active'); });
            document.querySelectorAll('.auth-tab').forEach(function(t){ t.classList.remove('active'); });

            var pane = document.getElementById('pane-' + name);
            if(pane) pane.classList.add('active');

            var tab = document.querySelector('.auth-tab[data-pane="' + name + '"]');
            if(tab) tab.classList.add('active');

            // Hide tabs and social on verify/forgot
            var isFlow = (name === 'verify' || name === 'forgot');
            document.getElementById('authTabs').style.display = isFlow ? 'none' : 'flex';
            document.getElementById('socialSection').style.display = isFlow ? 'none' : 'block';

            // Update footer
            var footerText = document.getElementById('footerText');
            var footerLink = document.getElementById('footerLink');
            if(name === 'login'){
                footerText.textContent = I18N.t('footer_no_account');
                footerLink.textContent = I18N.t('link_signup');
                footerLink.onclick = function(){ switchTab('signup'); };
                document.getElementById('authFooter').style.display = 'block';
            } else if(name === 'signup'){
                footerText.textContent = I18N.t('footer_have_account');
                footerLink.textContent = I18N.t('link_login');
                footerLink.onclick = function(){ switchTab('login'); };
                document.getElementById('authFooter').style.display = 'block';
            } else {
                document.getElementById('authFooter').style.display = 'none';
            }

            clearAlert();
        }

        // 언어 변경 시: 현재 활성 탭 기준으로 동적 푸터 텍스트 재동기화
        window.onI18nChange = function(){
            var active = document.querySelector('.pane.active');
            if(active){ switchTab(active.id.replace('pane-', '')); }
        };

        // ─── Toggle password visibility ───
        function togglePw(id){
            var el = document.getElementById(id);
            el.type = el.type === 'password' ? 'text' : 'password';
        }

        // ─── Password strength ───
        function checkPwStrength(){
            var pw = document.getElementById('signupPassword').value;
            var score = 0;
            if(pw.length >= 6) score++;
            if(pw.length >= 10) score++;
            if(/[A-Z]/.test(pw) || /[!@#$%^&*]/.test(pw)) score++;
            if(/[0-9]/.test(pw) && (/[A-Z]/.test(pw) || /[!@#$%^&*]/.test(pw))) score++;

            var bars = [
                document.getElementById('pwBar1'),
                document.getElementById('pwBar2'),
                document.getElementById('pwBar3'),
                document.getElementById('pwBar4')
            ];
            bars.forEach(function(b,i){
                b.className = 'pw-strength-bar';
                if(i < score){
                    if(score <= 1) b.classList.add('weak');
                    else if(score <= 2) b.classList.add('medium');
                    else b.classList.add('strong');
                }
            });
            var txt = document.getElementById('pwStrengthText');
            if(pw.length === 0){ txt.textContent = I18N.t('pw_strength'); txt.style.color = '#94a3b8'; }
            else if(score <= 1){ txt.textContent = I18N.t('pw_weak'); txt.style.color = '#ef4444'; }
            else if(score <= 2){ txt.textContent = I18N.t('pw_medium'); txt.style.color = '#f59e0b'; }
            else { txt.textContent = I18N.t('pw_strong'); txt.style.color = '#10b981'; }
        }

        // ─── Alerts ───
        function showAlert(message, type){
            var icon = type === 'error' ? '❌' : (type === 'success' ? '✅' : 'ℹ️');
            document.getElementById('alertArea').innerHTML =
                '<div class="alert ' + type + '"><span>' + icon + '</span><span>' + message + '</span></div>';
        }
        function clearAlert(){ document.getElementById('alertArea').innerHTML = ''; }

        // ─── Spinner state ───
        function setLoading(btnId, loading){
            var btn = document.getElementById(btnId);
            if(loading){ btn.classList.add('loading'); btn.disabled = true; }
            else { btn.classList.remove('loading'); btn.disabled = false; }
        }

        // ─── Supabase Auth REST ───
        async function supabaseAuth(endpoint, body, queryParams){
            var url = SUPABASE_URL + '/auth/v1/' + endpoint;
            if(queryParams) url += '?' + queryParams;
            try {
                var res = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(body)
                });
                var data = await res.json();
                return {ok: res.ok, status: res.status, data: data};
            } catch(err){
                return {ok: false, status: 0, data: {msg: err.message}};
            }
        }

        // ─── Signup ───
        async function handleSignup(){
            clearAlert();
            var name = document.getElementById('signupName').value.trim();
            var email = document.getElementById('signupEmail').value.trim();
            var password = document.getElementById('signupPassword').value;
            var passwordConfirm = document.getElementById('signupPasswordConfirm').value;
            var agreed = document.getElementById('agreeTerms').checked;

            if(!email){ showAlert(I18N.t('err_email_required'), 'error'); return; }
            if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ showAlert(I18N.t('err_email_invalid'), 'error'); return; }
            if(password.length < 6){ showAlert(I18N.t('err_pw_min'), 'error'); return; }
            if(password !== passwordConfirm){ showAlert(I18N.t('err_pw_mismatch'), 'error'); return; }
            if(!agreed){ showAlert(I18N.t('err_agree'), 'error'); return; }

            setLoading('btnSignup', true);

            var result = await supabaseAuth('signup', {
                email: email,
                password: password,
                data: {full_name: name}
            }, 'redirect_to=' + encodeURIComponent(REDIRECT_URL));

            setLoading('btnSignup', false);

            if(result.ok){
                // Save partial profile locally
                localStorage.setItem('snsAuthPendingEmail', email);
                if(name) localStorage.setItem('snsAuthName', name);

                // Check if email confirmation required (session is null until confirmed)
                if(result.data.user && !result.data.session){
                    document.getElementById('verifyEmailAddr').textContent = email;
                    switchTab('verify');
                } else if(result.data.session){
                    // Auto-confirmed (email confirmation disabled in Supabase)
                    saveSession(result.data.session, result.data.user);
                    showAlert(I18N.t('ok_signup'), 'success');
                    setTimeout(function(){ window.location.href = REDIRECT_URL; }, 1000);
                } else {
                    document.getElementById('verifyEmailAddr').textContent = email;
                    switchTab('verify');
                }
            } else {
                var errMsg = (result.data && (result.data.msg || result.data.message || result.data.error_description)) || I18N.t('err_signup');
                if(errMsg.indexOf('already registered') > -1 || errMsg.indexOf('User already') > -1){
                    errMsg = I18N.t('err_already');
                }
                showAlert(errMsg, 'error');
            }
        }

        // ─── Login ───
        async function handleLogin(){
            clearAlert();
            var email = document.getElementById('loginEmail').value.trim();
            var password = document.getElementById('loginPassword').value;

            if(!email){ showAlert(I18N.t('err_email_required'), 'error'); return; }
            if(!password){ showAlert(I18N.t('err_pw_required'), 'error'); return; }

            setLoading('btnLogin', true);

            var result = await supabaseAuth('token', {
                email: email,
                password: password
            }, 'grant_type=password');

            setLoading('btnLogin', false);

            if(result.ok && result.data.access_token){
                saveSession(result.data, result.data.user);
                // 로그인 활동 로그 (background)
                try {
                    fetch(SUPABASE_URL + '/rest/v1/activity_logs', {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': 'Bearer ' + result.data.access_token,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=minimal'
                        },
                        body: JSON.stringify({
                            user_id: result.data.user.id,
                            user_email: result.data.user.email,
                            action_type: 'LOGIN',
                            action_detail: '로그인 성공',
                            user_agent: navigator.userAgent
                        })
                    });
                } catch(e){}
                showAlert(I18N.t('ok_login'), 'success');
                setTimeout(function(){ window.location.href = REDIRECT_URL; }, 800);
            } else {
                var errMsg = (result.data && (result.data.error_description || result.data.msg || result.data.message)) || I18N.t('err_login');
                if(errMsg.indexOf('Invalid login') > -1 || errMsg.indexOf('credentials') > -1){
                    errMsg = I18N.t('err_invalid_cred');
                }
                if(errMsg.indexOf('Email not confirmed') > -1){
                    errMsg = I18N.t('err_not_confirmed');
                    document.getElementById('verifyEmailAddr').textContent = email;
                    setTimeout(function(){ switchTab('verify'); }, 1500);
                }
                showAlert(errMsg, 'error');
            }
        }

        // ─── Resend verification ───
        async function resendVerification(){
            var email = localStorage.getItem('snsAuthPendingEmail') || document.getElementById('verifyEmailAddr').textContent;
            if(!email || email === 'your@email.com'){ showAlert(I18N.t('err_resend_no_email'), 'error'); return; }

            var result = await supabaseAuth('resend', {
                type: 'signup',
                email: email
            }, 'redirect_to=' + encodeURIComponent(REDIRECT_URL));

            if(result.ok){
                showAlert('인증 메일이 재발송되었습니다. 메일함을 확인해주세요.', 'success');
            } else {
                showAlert('재발송 실패. 잠시 후 다시 시도해주세요.', 'error');
            }
        }

        // ─── Verify OTP (이메일로 받은 6자리 코드로 인증) ───
        async function handleVerifyOtp(){
            clearAlert();
            var email = localStorage.getItem('snsAuthPendingEmail') || document.getElementById('verifyEmailAddr').textContent;
            var token = document.getElementById('verifyOtp').value.trim();

            if(!email || email === 'your@email.com'){
                showAlert('인증할 이메일이 없습니다. 다시 회원가입해주세요.', 'error');
                return;
            }
            if(!/^[0-9]{6}$/.test(token)){
                showAlert('6자리 숫자 인증번호를 입력해주세요', 'error');
                return;
            }

            setLoading('btnVerify', true);

            // Supabase verify OTP endpoint
            var result = await supabaseAuth('verify', {
                type: 'signup',
                email: email,
                token: token
            });

            setLoading('btnVerify', false);

            if(result.ok && result.data.access_token){
                // 인증 성공 → 자동 로그인
                saveSession(result.data, result.data.user);
                showAlert('이메일 인증 완료! 잠시 후 이동합니다.', 'success');
                localStorage.removeItem('snsAuthPendingEmail');
                setTimeout(function(){ window.location.href = REDIRECT_URL; }, 1000);
            } else {
                var errMsg = (result.data && (result.data.error_description || result.data.msg || result.data.message)) || '인증 실패';
                if(errMsg.indexOf('expired') > -1 || errMsg.indexOf('Token') > -1){
                    errMsg = '인증번호가 만료되었거나 올바르지 않습니다. 재발송 후 다시 시도해주세요.';
                } else if(errMsg.indexOf('invalid') > -1 || errMsg.indexOf('Invalid') > -1){
                    errMsg = '인증번호가 일치하지 않습니다. 다시 확인해주세요.';
                }
                showAlert(errMsg, 'error');
            }
        }

        // ─── Forgot password ───
        function forgotPassword(){ switchTab('forgot'); }

        async function handleForgot(){
            clearAlert();
            var email = document.getElementById('forgotEmail').value.trim();
            if(!email){ showAlert('이메일을 입력해주세요', 'error'); return; }
            if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ showAlert('올바른 이메일 형식이 아닙니다', 'error'); return; }

            setLoading('btnForgot', true);
            var result = await supabaseAuth('recover', {
                email: email
            }, 'redirect_to=' + encodeURIComponent(REDIRECT_URL));
            setLoading('btnForgot', false);

            if(result.ok){
                showAlert('재설정 링크를 이메일로 보냈습니다. 메일함을 확인해주세요.', 'success');
            } else {
                showAlert('전송 실패. 이메일을 확인해주세요.', 'error');
            }
        }

        // ─── Social (placeholder) ───
        function showSocialAlert(provider){
            showAlert(provider + ' 로그인은 준비 중입니다. 이메일 회원가입을 이용해주세요.', 'info');
        }

        // ─── Save session ───
        function saveSession(session, user){
            var saveData = {
                access_token: session.access_token,
                refresh_token: session.refresh_token,
                expires_at: session.expires_at || (Math.floor(Date.now()/1000) + (session.expires_in || 3600)),
                user: user || session.user
            };
            localStorage.setItem('snsAuthSession', JSON.stringify(saveData));
            if(saveData.user && saveData.user.email){
                localStorage.setItem('snsAuthEmail', saveData.user.email);
            }
            localStorage.removeItem('snsAuthPendingEmail');
        }

        // ─── Handle email verification callback (hash params from Supabase redirect) ───
        function handleAuthCallback(){
            var hash = window.location.hash.substring(1);
            if(!hash) return;
            var params = {};
            hash.split('&').forEach(function(pair){
                var parts = pair.split('=');
                if(parts[0]) params[parts[0]] = decodeURIComponent(parts[1] || '');
            });
            if(params.access_token){
                // Email verified - save session and redirect
                var session = {
                    access_token: params.access_token,
                    refresh_token: params.refresh_token,
                    expires_at: Math.floor(Date.now()/1000) + parseInt(params.expires_in || '3600'),
                    user: null
                };
                // Fetch user info
                fetch(SUPABASE_URL + '/auth/v1/user', {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': 'Bearer ' + params.access_token
                    }
                }).then(function(r){ return r.json(); }).then(function(user){
                    session.user = user;
                    saveSession(session, user);
                    showAlert('이메일 인증 완료! 잠시 후 이동합니다.', 'success');
                    setTimeout(function(){ window.location.href = REDIRECT_URL; }, 1200);
                }).catch(function(){
                    saveSession(session, null);
                    showAlert('인증 완료! 이동합니다.', 'success');
                    setTimeout(function(){ window.location.href = REDIRECT_URL; }, 1200);
                });
            }
        }

        // Run callback handler on load
        handleAuthCallback();

        // Enter key to submit
        document.getElementById('loginPassword').addEventListener('keypress', function(e){
            if(e.key === 'Enter') handleLogin();
        });
        document.getElementById('signupPasswordConfirm').addEventListener('keypress', function(e){
            if(e.key === 'Enter') handleSignup();
        });
        document.getElementById('verifyOtp').addEventListener('keypress', function(e){
            if(e.key === 'Enter') handleVerifyOtp();
        });
        // 숫자만 허용
        document.getElementById('verifyOtp').addEventListener('input', function(e){
            this.value = this.value.replace(/[^0-9]/g, '').slice(0, 6);
            if(this.value.length === 6) handleVerifyOtp();
        });
    </script>
    <script>
        if("serviceWorker" in navigator){ navigator.serviceWorker.register("/divoost-website/sns-platform/sw.js").catch(function(){}); }
