<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 110" role="img" aria-label="HubOnTrade">
  <!-- H 마크 (이탤릭, 단색 블루) -->
  <g transform="translate(0, 0)">
    <!-- 왼쪽 슬랜트 기둥 -->
    <path d="M22,8 L48,8 L42,76 L16,76 Z" fill="#1E40AF"/>
    <!-- 오른쪽 슬랜트 기둥 -->
    <path d="M58,8 L84,8 L78,76 L52,76 Z" fill="#1E40AF"/>
    <!-- 가운데 가로 바 -->
    <path d="M18,36 L82,36 L80,50 L16,50 Z" fill="#1E40AF"/>

    <!-- 오렌지 스윕 화살표 (H를 둘러쌈) -->
    <path d="M-2,68 C12,76 30,80 50,72 C70,64 82,42 92,18"
          fill="none" stroke="#F97316" stroke-width="7" stroke-linecap="round"/>
    <!-- 화살촉 -->
    <path d="M86,4 L104,12 L92,28 Z" fill="#F97316"/>
  </g>

  <!-- 텍스트: Hub On Trade -->
  <g font-family="'Poppins', 'Inter', system-ui, sans-serif" font-weight="800" font-size="36" letter-spacing="-0.5">
    <text x="116" y="60" fill="#0F172A">Hub</text>
    <text x="198" y="60" fill="#F97316">On</text>
    <text x="262" y="60" fill="#2563EB">Trade</text>
  </g>
</svg>
