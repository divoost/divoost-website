<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:380px;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f172a;color:#e2e8f0}
.header{background:linear-gradient(135deg,#1e293b,#0f172a);padding:16px;text-align:center;border-bottom:1px solid #334155}
.logo{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,#FF6A00,#2563EB);border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:12px}
.logo-text{font-size:16px;font-weight:700;color:#e2e8f0}
.subtitle{font-size:11px;color:#94a3b8}
.stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;padding:12px 16px}
.stat{background:#1e293b;border-radius:8px;padding:10px;text-align:center}
.stat-value{font-size:20px;font-weight:800;color:#3b82f6}
.stat-label{font-size:10px;color:#94a3b8;margin-top:2px}
.section{padding:12px 16px}
.section-title{font-size:11px;font-weight:600;color:#94a3b8;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.btn{width:100%;padding:10px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;margin-bottom:6px;display:flex;align-items:center;justify-content:center;gap:6px}
.btn-primary{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff}
.btn-primary:hover{box-shadow:0 2px 8px rgba(59,130,246,.4)}
.btn-success{background:#10b981;color:#fff}
.btn-outline{background:transparent;border:1px solid #334155;color:#94a3b8}
.btn-outline:hover{border-color:#3b82f6;color:#3b82f6}
.btn-danger{background:#ef4444;color:#fff}
.btn:disabled{opacity:.5;cursor:not-allowed}
.platform-list{display:flex;flex-direction:column;gap:4px}
.platform-item{display:flex;align-items:center;justify-content:space-between;padding:8px 10px;background:#1e293b;border-radius:6px;font-size:12px}
.platform-name{display:flex;align-items:center;gap:6px}
.platform-dot{width:8px;height:8px;border-radius:50%}
.platform-count{font-size:11px;color:#64748b}
.toggle{position:relative;width:36px;height:20px;background:#334155;border-radius:10px;cursor:pointer}
.toggle.active{background:#3b82f6}
.toggle::after{content:'';position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:2px;left:2px;transition:.2s}
.toggle.active::after{left:18px}
.log{background:#0f172a;border:1px solid #334155;border-radius:6px;padding:8px;font-family:monospace;font-size:10px;color:#94a3b8;max-height:100px;overflow-y:auto;margin-top:8px}
.footer{padding:10px 16px;text-align:center;border-top:1px solid #1e293b}
.footer a{color:#3b82f6;text-decoration:none;font-size:11px}
.status-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600}
.status-online{background:rgba(16,185,129,.15);color:#34d399}
.status-offline{background:rgba(239,68,68,.15);color:#f87171}
</style>
</head>
<body>
<div class="header">
  <div class="logo"><div class="logo-icon">E</div><span class="logo-text">EZCOMET 소싱 트래커</span></div>
  <div class="subtitle">크로스보더 이커머스 상품 수집 도구</div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-value" id="totalCollected">0</div><div class="stat-label">총 수집 상품</div></div>
  <div class="stat"><div class="stat-value" id="lastTime">-</div><div class="stat-label">마지막 수집</div></div>
</div>

<div class="section">
  <div class="section-title">🕷 현재 페이지 수집</div>
  <button class="btn btn-primary" id="scrapeBtn">🕷 이 페이지에서 상품 수집</button>
  <div id="scrapeResult" style="display:none;padding:6px 10px;background:rgba(16,185,129,.1);border-radius:6px;font-size:11px;color:#34d399;margin-top:4px"></div>
</div>

<div class="section">
  <div class="section-title">📡 지원 플랫폼</div>
  <div class="platform-list">
    <div class="platform-item"><span class="platform-name"><span class="platform-dot" style="background:#E42528"></span>쿠팡</span><span class="platform-count" id="cnt-coupang">-</span></div>
    <div class="platform-item"><span class="platform-name"><span class="platform-dot" style="background:#FF6A00"></span>1688</span><span class="platform-count" id="cnt-1688">-</span></div>
    <div class="platform-item"><span class="platform-name"><span class="platform-dot" style="background:#03C75A"></span>네이버 쇼핑</span><span class="platform-count" id="cnt-naver">-</span></div>
    <div class="platform-item"><span class="platform-name"><span class="platform-dot" style="background:#EE4D2D"></span>Shopee</span><span class="platform-count" id="cnt-shopee">-</span></div>
    <div class="platform-item"><span class="platform-name"><span class="platform-dot" style="background:#0F146D"></span>Lazada</span><span class="platform-count">준비중</span></div>
    <div class="platform-item"><span class="platform-name"><span class="platform-dot" style="background:#000"></span>TikTok Shop</span><span class="platform-count">준비중</span></div>
  </div>
</div>

<div class="section">
  <div class="section-title">⚙️ 설정</div>
  <div class="platform-item" style="margin-bottom:6px">
    <span style="font-size:12px">자동 수집 (6시간마다)</span>
    <div class="toggle" id="autoToggle" onclick="toggleAuto()"></div>
  </div>
  <button class="btn btn-outline" id="openDashboard">📊 대시보드 열기</button>
  <button class="btn btn-outline" id="exportBtn">📥 CSV 내보내기</button>
</div>

<div class="section">
  <div class="section-title">📋 수집 로그</div>
  <div class="log" id="logArea">확장 프로그램이 준비되었습니다.</div>
</div>

<div class="footer">
  <a href="https://divoost.github.io/divoost-website/dashboard/" target="_blank">EZCOMET 대시보드 →</a>
  <span style="margin:0 8px;color:#334155">|</span>
  <span class="status-badge status-online" id="dbStatus">DB 연결됨</span>
</div>

<script src="popup.js"></script>
</body>
</html>
